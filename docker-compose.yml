# Sygen single-node docker-compose deployment.
# Fetched by install.sh to /srv/sygen/docker-compose.yml.
#
# SYGEN_CORE_IMAGE and SYGEN_ADMIN_IMAGE can be pinned via .env next to
# this file; defaults track :latest from GHCR.
#
# Ports bind to 127.0.0.1 only. nginx on the host proxies 443 to these.

services:
  core:
    image: ${SYGEN_CORE_IMAGE:-ghcr.io/alexeymorozua/sygen-core:latest}
    container_name: sygen-core
    restart: unless-stopped
    volumes:
      - /srv/sygen/data:/data
      # Persist Claude Code CLI credentials across container rebuilds.
      - /srv/sygen/claude-auth:/home/sygen/.claude
    environment:
      - SYGEN_HOME=/data
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Provide either ANTHROPIC_API_KEY here, or run
      # `docker compose exec core claude auth login` after first start.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Shared secret for the /api/system/updates/apply proxy to the
      # updater sidecar. Generated by install.sh; if empty, core returns
      # 501 from the apply endpoint.
      - SYGEN_UPDATER_TOKEN=${SYGEN_UPDATER_TOKEN:-}
      - SYGEN_UPDATER_URL=${SYGEN_UPDATER_URL:-http://sygen-updater:8082}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "127.0.0.1:8081:8081"

  admin:
    image: ${SYGEN_ADMIN_IMAGE:-ghcr.io/alexeymorozua/sygen-admin:latest}
    container_name: sygen-admin
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Browser-side API URL. Empty string = same-origin, so the browser
      # hits the nginx vhost and nginx reverse-proxies /api + /ws to core.
      - NEXT_PUBLIC_SYGEN_API_URL=${NEXT_PUBLIC_SYGEN_API_URL:-}
    depends_on:
      - core
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "127.0.0.1:3000:3000"

  # Polls GHCR every 30 min for new image digests on labeled containers
  # (--label-enable scopes this to `com.centurylinklabs.watchtower.enable=true`).
  # --monitor-only means Watchtower never applies updates on its own — it only
  # detects them. The sygen-updater sidecar + admin UI drive user-approved
  # apply, so an in-flight session doesn't get killed mid-work.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: sygen-watchtower
    restart: unless-stopped
    command: --label-enable --monitor-only --interval 1800
    environment:
      - TZ=UTC
      # No DOCKER_API_VERSION pin — modern Watchtower (1.7+) negotiates the
      # API version with the daemon at startup. The previous 1.40 pin was
      # added when Watchtower defaulted to 1.25 and Docker 29 dropped that;
      # but Colima 0.10+ ships Engine 27 which REJECTS API <1.44, so the
      # pin actively breaks updates now. Bare default = pick the highest
      # mutually supported version.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # Updater sidecar — does what Watchtower intentionally doesn't: actually
  # pull and recreate the core/admin containers on demand. Core exposes
  # GET /api/system/updates (reads /srv/sygen/data/_updates.json) and
  # POST /api/system/updates/apply (proxies to this sidecar's /apply).
  # Not published to the host: only containers on the compose network can
  # reach :8082.
  updater:
    image: ${SYGEN_UPDATER_IMAGE:-ghcr.io/alexeymorozua/sygen-updater:latest}
    container_name: sygen-updater
    restart: unless-stopped
    expose:
      - "8082"
    environment:
      - TZ=UTC
      # No DOCKER_API_VERSION — auto-negotiate with the daemon. See the
      # watchtower service above for the full rationale.
      - SYGEN_UPDATER_TOKEN=${SYGEN_UPDATER_TOKEN:-}
      - CHECK_INTERVAL=1800
      - CORE_IMAGE=${SYGEN_CORE_IMAGE:-ghcr.io/alexeymorozua/sygen-core:latest}
      - ADMIN_IMAGE=${SYGEN_ADMIN_IMAGE:-ghcr.io/alexeymorozua/sygen-admin:latest}
      - COMPOSE_FILE=/srv/sygen/docker-compose.yml
      - COMPOSE_ENV_FILE=/srv/sygen/.env
    volumes:
      # RW — /apply runs `docker compose pull && up -d`.
      - /var/run/docker.sock:/var/run/docker.sock
      # Compose file + .env so the sidecar can invoke `docker compose`.
      - /srv/sygen:/srv/sygen
      # State file shared with core; core mounts /srv/sygen/data at /data
      # so it reads /data/_updates.json.
      - /srv/sygen/data:/state
    # NOTE: deliberately NOT labeled with com.centurylinklabs.watchtower.enable.
    # Watchtower currently runs in --monitor-only mode (it never applies),
    # so the label is harmless today. But one flag flip turns Watchtower
    # into an applier, and it would happily kill the updater container in
    # the middle of an apply request. Operator redeploys the sidecar
    # manually:  docker compose pull updater && docker compose up -d updater.
