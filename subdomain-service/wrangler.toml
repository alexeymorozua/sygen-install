# Cloudflare Worker config — Sygen subdomain provisioning service.
# Full deploy steps live in README.md "Pre-deploy checklist".
#
# Quick reference:
#   wrangler login
#   wrangler kv namespace create SUBDOMAIN_RESERVATIONS
#   wrangler kv namespace create TOKEN_INDEX
#   # paste returned IDs into [[kv_namespaces]] below
#   wrangler secret put CF_MASTER_API_TOKEN
#   wrangler secret put ADMIN_TOKEN
#   wrangler deploy

name = "sygen-subdomain-service"
main = "src/worker.js"
compatibility_date = "2026-04-01"

# Bound to install.sygen.pro/api/*. The static install.sh + docker-compose.yml
# continue to be served by Pages on the same hostname; only /api/* routes hit
# this Worker.
[[routes]]
pattern = "install.sygen.pro/api/*"
zone_name = "sygen.pro"

# KV namespaces — created via `wrangler kv namespace create` (2026-04-25).
[[kv_namespaces]]
binding = "SUBDOMAIN_RESERVATIONS"
id = "af12dbe5a8fc4afcadc597f95ac14098"

[[kv_namespaces]]
binding = "TOKEN_INDEX"
id = "a75bf627d88a4a1c830ea5bcf843560d"

# Non-secret config.
[vars]
SYGEN_DOMAIN = "sygen.pro"
SYGEN_CF_ZONE_ID = "6ae59801f8ac7b5dc33b6e32d844b0a6"
TTL_DAYS = "30"
SUBDOMAIN_LENGTH = "8"
# Per-IP cap on /api/provision per 1-hour window. Default in code is 5;
# bumped to 30 to support iterative VPS-deploy testing from a single
# developer IP without rotating subdomains. Production users almost never
# hit even 5 (one provision per fresh install). Defence-in-depth still
# protects the underlying CF API quota — 30/h * 1 IP <<< 1200/5min/zone.
PROVISION_RATE_LIMIT = "30"
# APNs auth key ID — public identifier paired with the secret
# APNS_AUTH_KEY_B64. install.sh writes the .p8 out as
# AuthKey_${APNS_KEY_ID}.p8, so this must match the key registered at
# developer.apple.com (currently RBJZU2A5KU). The secret is set via
#   wrangler secret put APNS_AUTH_KEY_B64 < <(base64 < AuthKey_*.p8)
APNS_KEY_ID = "RBJZU2A5KU"

# Daily sweep at 02:00 UTC — deletes expired reservations.
[triggers]
crons = ["0 2 * * *"]

# Secrets (set via `wrangler secret put`):
#   CF_MASTER_API_TOKEN — has Zone.DNS:Edit on sygen.pro; used to create A
#                         records during /api/provision and TXT records for
#                         ACME DNS-01 via /api/dns-challenge.
#   ADMIN_TOKEN         — required for /api/health and any future admin routes.
#   APNS_AUTH_KEY_B64   — base64 of the .p8 APNs auth key (paired with
#                         APNS_KEY_ID above). Served by /api/bootstrap/apns
#                         to install.sh; if unset the endpoint returns 503
#                         and install.sh leaves push disabled (no fatal).
